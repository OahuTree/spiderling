name: Build and Release Spiderling

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            # 修改路径匹配模式，让它更稳健
            artifact_name: "spiderling-windows"
            path_to_upload: "dist/*.zip"
          - os: macos-13
            platform: macos-x86_64
            artifact_name: "spiderling-macos-x86_64"
            path_to_upload: "dist/*.dmg"
          - os: macos-latest
            platform: macos-arm64
            artifact_name: "spiderling-macos-arm64"
            path_to_upload: "dist/*.dmg"
          - os: ubuntu-20.04
            platform: linux
            artifact_name: "spiderling-linux"
            path_to_upload: "*.zip"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller -r requirements.txt
          if [ "${{ runner.os }}" == "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y libxcb-xinerama0 libx11-xcb1 binutils zip
          fi
        shell: bash

      - name: Inject Version Information
        shell: bash
        run: |
          VERSION=${{ github.ref_name || 'manual' }}
          echo "__version__ = '$VERSION'" > services/version_info.py
          # 下面这一条是用来在 GitHub Actions 的运行日志里打印出来给你看的
          echo "Successfully injected version $VERSION into services/version_info.py"

      - name: Debug - Check Version File
        shell: bash
        run: |
          ls -R services/  # 查看 services 文件夹下是否有文件
          cat services/version_info.py || echo "File not found!"

      - name: Build on Windows
        if: matrix.platform == 'windows'
        run: |
          pyinstaller --windowed --onedir --noconfirm ^
          --icon="assets/logo.ico" ^
          --hidden-import=services.version_info ^
          --hidden-import="psycopg2" --hidden-import="pymssql" ^
          --hidden-import="selenium" --hidden-import="webdriver-manager" ^
          --hidden-import="selenium.webdriver.chrome.webdriver" ^
          spiderling.py
          xcopy /s /e /i .\config\. .\dist\spiderling\config\.
          xcopy /s /e /i .\assets\. .\dist\spiderling\assets\.
          # --- 这里取消了注释，并确保生成在 dist 目录下 ---
          powershell -Command "Compress-Archive -Path 'dist/spiderling' -DestinationPath 'dist/spiderling-windows-${{ github.ref_name || 'manual' }}.zip' -Force"
        shell: cmd

      - name: Build on macOS
        if: startsWith(matrix.platform, 'macos')
        run: |
          pyinstaller --windowed --onedir --noconfirm --icon="assets/logo.icns" --add-data "config:config" --add-data "assets:assets" --hidden-import=services.version_info --hidden-import="psycopg2" --hidden-import="pymssql" --hidden-import="selenium" --hidden-import="webdriver-manager" --hidden-import="selenium.webdriver.chrome.webdriver" spiderling.py
          brew install create-dmg
          create-dmg --volname "Spiderling-${{ github.ref_name || 'manual' }}" --window-size 600 400 --icon-size 100 --icon "spiderling.app" 175 120 --app-drop-link 425 120 "dist/spiderling-${{ matrix.platform }}-${{ github.ref_name || 'manual' }}.dmg" "dist/spiderling.app"
        shell: bash

      - name: Build on Linux
        if: matrix.platform == 'linux'
        run: |
          pyinstaller --windowed --onedir --noconfirm --add-data "config:config" --add-data "assets:assets" --hidden-import=services.version_info --hidden-import="psycopg2" --hidden-import="pymssql" --hidden-import="selenium" --hidden-import="webdriver-manager" --hidden-import="selenium.webdriver.chrome.webdriver" spiderling.py
          cd dist && zip -r ../spiderling-linux-${{ github.ref_name || 'manual' }}.zip spiderling/
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.path_to_upload }}

      - name: Release App
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          fail_on_unmatched_files: false
          files: |
            dist/*.dmg
            dist/*.zip
            *.zip
            *.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
