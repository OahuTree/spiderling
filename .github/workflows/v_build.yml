name: Build and Release Spiderling

on:
  push:
    tags:
      - 'v*' # 当你运行 git tag v1.0.0 和 git push --tags 时触发
  workflow_dispatch: # 允许你在 GitHub 页面手动点击 "Run workflow" 触发

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            executable_path: "dist/spiderling-windows-${{ github.ref_name || 'manual' }}.zip"
          - os: macos-13            # Intel x86 架构 Mac
            platform: macos-x86_64
            executable_path: "dist/*.dmg"
          - os: macos-latest        # M系列 arm64 架构 Mac
            platform: macos-arm64
            executable_path: "dist/*.dmg"
          - os: ubuntu-20.04        # Linux (使用旧版以提高兼容性)
            platform: linux
            executable_path: "spiderling-linux-*.zip"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller -r requirements.txt
          if [ "${{ runner.os }}" == "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y libxcb-xinerama0 libx11-xcb1 binutils zip
          fi
        shell: bash

      # --- 1. 注入版本号 ---
      - name: Inject Version Information
        shell: bash
        run: |
          # 如果是手动触发没有 Tag，则显示 manual
          VERSION=${{ github.ref_name || 'manual' }}
          echo "__version__ = '$VERSION'" > services/version_info.py
          echo "Injected version $VERSION into services/version_info.py"

      # --- 2. Windows 编译与自动压缩 ---
      - name: Build on Windows
        if: matrix.platform == 'windows'
        run: |
          pyinstaller --windowed --onedir --noconfirm ^
          --icon="assets/logo.ico" ^
          --hidden-import="psycopg2" --hidden-import="pymssql" ^
          --hidden-import="selenium" --hidden-import="webdriver-manager" ^
          --hidden-import="selenium.webdriver.chrome.webdriver" ^
          spiderling.py
          
          xcopy /s /e /i .\config\. .\dist\spiderling\config\.
          xcopy /s /e /i .\assets\. .\dist\spiderling\assets\.
          
#          powershell -Command "Compress-Archive -Path 'dist/spiderling' -DestinationPath 'dist/spiderling-windows-${{ github.ref_name || 'manual' }}.zip' -Force"
        shell: cmd

      # --- 3. macOS 编译与制作 DMG ---
      - name: Build on macOS
        if: startsWith(matrix.platform, 'macos')
        run: |
          pyinstaller --windowed --onedir --noconfirm \
          --icon="assets/logo.icns" \
          --add-data "config:config" \
          --add-data "assets:assets" \
          --hidden-import="psycopg2" --hidden-import="pymssql" \
          --hidden-import="selenium" --hidden-import="webdriver-manager" \
          --hidden-import="selenium.webdriver.chrome.webdriver" \
          spiderling.py
          
          brew install create-dmg
          create-dmg \
            --volname "Spiderling-${{ github.ref_name || 'manual' }}" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "spiderling.app" 175 120 \
            --app-drop-link 425 120 \
            "dist/spiderling-${{ matrix.platform }}-${{ github.ref_name || 'manual' }}.dmg" \
            "dist/spiderling.app"
        shell: bash

      # --- 4. Linux 编译与自动压缩 ---
      - name: Build on Linux
        if: matrix.platform == 'linux'
        run: |
          pyinstaller --windowed --onedir --noconfirm \
          --add-data "config:config" --add-data "assets:assets" \
          --hidden-import="psycopg2" --hidden-import="pymssql" \
          --hidden-import="selenium" --hidden-import="webdriver-manager" \
          --hidden-import="selenium.webdriver.chrome.webdriver" \
          spiderling.py
          
          cd dist && zip -r ../spiderling-linux-${{ github.ref_name || 'manual' }}.zip spiderling/
        shell: bash

      # --- 5. 上传到 Actions Artifacts (方便手动下载测试) ---
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spiderling-${{ matrix.platform }}
          path: ${{ matrix.executable_path }}

      # --- 6. 自动发布到 Releases 页面 (仅在推送 Tag 时执行) ---
      - name: Release App
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
