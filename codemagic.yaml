workflows:
  spiderling-macos:
    name: Spiderling macOS Build
    instance_type: mac_mini_m2

    environment:
      vars:
        PYTHON_VERSION: 3.10

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"

    scripts:
      - name: Setup Python
        script: |
          brew install python@3.10
          python3.10 -m pip install --upgrade pip

      - name: Install deps
        script: |
          python3.10 -m pip install -r requirements.txt
          python3.10 -m pip install pyinstaller

      - name: Build
        script: |
          python3.10 -m PyInstaller \
            --windowed \
            --onedir \
            --name Spiderling \
            --target-architecture universal2 \
            spiderling.py

    artifacts:
      - dist/**/*
